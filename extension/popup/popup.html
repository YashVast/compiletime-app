<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #cba6f7;
    }
    .row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .label { color: #a6adc8; }
    .value { font-weight: 600; }
    #status {
      margin-top: 14px;
      font-size: 11px;
      color: #6c7086;
      text-align: center;
    }
    #status.connected { color: #a6e3a1; }
  </style>
</head>
<body>
  <h1>⚡ CompileTime</h1>
  <div class="row">
    <span class="label">Total XP</span>
    <span class="value" id="xp">—</span>
  </div>
  <div class="row">
    <span class="label">Questions answered</span>
    <span class="value" id="answered">—</span>
  </div>
  <div id="status">Checking companion...</div>
  <script src="popup.js"></script>
</body>
</html>
